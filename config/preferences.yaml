# ===================================
# 個人ニュース設定ファイル
# ===================================

# --- 基本設定 ---
language: "ja"           # 要約・出力言語（ja = 日本語）
articles_per_category: 5  # カテゴリごとの記事数
output_language: "ja"    # HTMLページの表示言語


# --- カテゴリ設定 ---
# weight: 重要度（1〜5）。高いほどGeminiが優先的に選ぶ
categories:

  - name: "AI・テクノロジー"
    weight: 5
    keywords:
      - "半導体"
      - "NVIDIA"
      - "エヌビディア"
      - "Claude"
      - "Anthropic"
      - "OpenAI"
      - "Gemini"
      - "生成AI"
      - "LLM"
      - "機械学習"
      - "GPU"
      - "TSMC"
      - "AI規制"
    rss_sources:
      - name: "ITmedia NEWS"
        url: "https://rss.itmedia.co.jp/rss/2.0/news_bursts.xml"
      - name: "Zenn"
        url: "https://zenn.dev/feed"
      - name: "Qiita"
        url: "https://qiita.com/popular-items/feed"

  - name: "政治・国際情勢"
    weight: 4
    keywords:
      - "日米関係"
      - "トランプ"
      - "石破"
      - "日本首相"
      - "アメリカ大統領"
      - "関税"
      - "日米首脳会談"
      - "外交"
      - "安全保障"
      - "NATO"
      - "中国"
      - "台湾"
    rss_sources:
      - name: "BBC Japan"
        url: "https://feeds.bbci.co.uk/japanese/rss.xml"
      - name: "ロイター日本語版"
        url: "https://feeds.reuters.com/reuters/JPdomesticNews"

  - name: "経済・金融"
    weight: 4
    keywords:
      - "円安"
      - "円高"
      - "日銀"
      - "金利"
      - "為替"
      - "ガソリン価格"
      - "物価"
      - "インフレ"
      - "株価"
      - "日経平均"
      - "FRB"
      - "利上げ"
      - "貿易摩擦"
    rss_sources:
      - name: "ロイター経済"
        url: "https://feeds.reuters.com/reuters/JPbusinessNews"
      - name: "東洋経済オンライン"
        url: "https://toyokeizai.net/list/feed/rss"



# --- Slack通知設定 ---
slack:
  channel: "#news"        # 通知先チャンネル（変更可）
  mention: false          # @here などのメンションをつけるか
  message_template: |
    📰 *今日のニュース ({date})* 
    AI・テクノロジー / 政治・国際情勢 / 経済・金融 の注目 {news_per_day} 本
    👉 {page_url}
